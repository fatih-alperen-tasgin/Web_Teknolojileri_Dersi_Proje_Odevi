<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Giriş Yap</h2>
            <p class="text-muted small">Sakarya Üniversitesi Bilgi Sistemi</p>
        </div>

        <form action="php/login.php" method="POST" onsubmit="return form_dogrula()">
            <div class="mb-3">
                <label for="kullanici" class="form-label">Kullanıcı Adı (E-posta)</label>
                <input type="email" class="form-control" id="kullanici" name="kullanici" 
                       placeholder="b241210079@sakarya.edu.tr" required>
            </div>
            <div class="mb-3">
                <label for="sifre" class="form-label">Şifre (Öğrenci Numarası)</label>
                <input type="password" class="form-control" id="sifre" name="sifre" 
                       placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Giriş Yap</button>
        </form>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
